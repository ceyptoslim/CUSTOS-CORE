apiVersion: apps/v1
kind: Deployment
metadata:
  name: custos-core
  labels:
    app: custos-core
    version: "1.1.1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: custos-core
  template:
    metadata:
      labels:
        app: custos-core
        version: "1.1.1"
    spec:
      containers:
        - name: custos-core
          image: custos-core:1.1.1
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: custos-config
          env:
            # Mount DATABASE_URL from a Kubernetes Secret (not ConfigMap).
            # Create with:
            #   kubectl create secret generic custos-db-secret \
            #     --from-literal=DATABASE_URL=postgresql://user:pass@host:5432/custos
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: custos-db-secret
                  key: DATABASE_URL
                  optional: true   # falls back to in-memory if secret absent
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
