apiVersion: apps/v1
kind: Deployment
metadata:
  name: custos-core
  labels:
    app: custos-core
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: custos-core
  template:
    metadata:
      labels:
        app: custos-core
        version: "1.0.0"
    spec:
      containers:
        - name: custos-core
          image: custos-core:1.0.0
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: custos-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
